{{define "label_modal"}}
<div x-cloak x-data @keydown.escape.window="AnnotatorModule.abort()">
    <div x-cloak x-show="$store.{{.ModalName}}.isOpen()" x-transition.opacity.duration.200ms x-trap.inert.noscroll="$store.{{.ModalName}}.isOpen()" x-on:keydown.esc.window="AnnotatorModule.abort()" x-on:click.self="AnnotatorModule.abort()" class="fixed inset-0 z-30 flex items-end justify-center bg-black/20 p-4 pb-8 backdrop-blur-md sm:items-center lg:p-8" role="dialog" aria-modal="true" aria-labelledby="defaultModalTitle">
<!-- Modal Dialog -->
        <div x-show="$store.{{.ModalName}}.isOpen()" x-transition:enter="transition ease-out duration-200 delay-100 motion-reduce:transition-opacity" x-transition:enter-start="opacity-0 scale-50" x-transition:enter-end="opacity-100 scale-100" class="flex w-96 flex-col gap-4 overflow-hidden rounded-radius border border-outline bg-surface text-on-surface dark:border-outline-dark dark:bg-surface-dark-alt dark:text-on-surface-dark">
            <!-- Dialog Header -->
            <div class="flex items-center justify-between border-b border-outline bg-surface-alt/60 p-4 dark:border-outline-dark dark:bg-surface-dark/20">
                <h3 id="defaultModalTitle" class="font-semibold tracking-wide text-on-surface-strong dark:text-on-surface-dark-strong">Select label</h3>
                <button x-on:click="AnnotatorModule.abort()" aria-label="close modal">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" fill="none" stroke-width="1.4" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            {{template "label_modal_combobox" .}}
        </div>
    </div>
</div>
{{end}}
