<style>
.btn-copy {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    background: var(--accent-dim);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    border: none;
    border-radius: 5px;
    padding: .45rem .8rem;
    cursor: pointer;
    transition: background .15s;
}
.btn-copy:hover { background: #3a8a6e; }
.btn-copy.copied { background: #1e4a35; color: #6EE7B7; }
</style>
<script>
    function copyToken(btn) {
      const token = document.getElementById('token-value').textContent;
        navigator.clipboard.writeText({{.Token}}).then(() => {
        btn.classList.add('copied');
            btn.innerHTML = `
                <span class="flex items-center">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                    <div class="ml-1">Copied</div>
                </span>
`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
                <span class="flex items-center">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-2 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <div class="ml-1">Copy</div>
                </span>
`;
        }, 2500);
      });
    }

</script>
<div class="relative w-full overflow-hidden rounded-sm border border-amber-500 bg-surface text-on-surface dark:bg-surface-dark dark:text-on-surface-dark" role="alert">
    <div class="flex w-full items-center gap-2 bg-warning/10 p-4">
        <div class="bg-amber-500/15 text-amber-500 rounded-full p-1" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-6" aria-hidden="true">
                <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
            </svg>
        </div>
        <div class="ml-2">
            <h3 class="text-sm font-semibold text-warning">Copy this token now.</h3>
            <p class="text-xs font-medium sm:text-sm">For security reasons it will not be shown again once you leave this page.</p>
        </div>
    </div>
</div>
<div class="group rounded-radius flex mt-1 max-w-md flex-col border border-outline bg-surface p-1 dark:border-outline-dark dark:bg-surface-dark">
    <div class="m-1">
        <div class="uppercase text-sm text-on-surface dark:text-on-surface-dark">Your new API token</div>
        <div>
            <span class="text-secondary dark:text-secondary-dark" id="token-value">{{.Token}}</span>
            <span>
                <button
                class="whitespace-nowrap rounded-radius bg-success border border-success px-4 py-2 text-sm font-medium tracking-wide text-onSuccess transition hover:opacity-75 text-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-success active:opacity-100 active:outline-offset-0 disabled:opacity-75 disabled:cursor-not-allowed dark:bg-success dark:border-success dark:text-onSuccess dark:focus-visible:outline-success"
                onclick="copyToken(this)">
                    <span class="flex items-center">
                        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-2 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <div class="ml-1">Copy</div>
                    </span>
                </button>
            </span>
        </div>
    </div>
</div>
